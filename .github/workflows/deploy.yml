name: Deploy to Contabo

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
        env:
          SSH_KEY: ${{ secrets.CONTABO_SSH_KEY }}

      - name: Deploy
        run: |
          ssh -p 2222 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=20 -o PasswordAuthentication=no -i ~/.ssh/deploy_key root@46.250.248.31 '
            set -e
            cd /opt/syzygy || exit 1

            # 备份沈望在VPS上修改的文件
            mkdir -p /tmp/syzygy_backup
            git diff --name-only | while read f; do
              if [ -f "$f" ]; then
                dir=$(dirname "$f")
                mkdir -p "/tmp/syzygy_backup/$dir"
                cp "$f" "/tmp/syzygy_backup/$f"
                echo "  💾 备份: $f"
              fi
            done

            # 部署最新代码
            git fetch origin main
            git reset --hard origin/main
            npm install --production

            # 恢复沈望的本地修改
            if [ -d /tmp/syzygy_backup ]; then
              find /tmp/syzygy_backup -type f | while read f; do
                rel=$(echo "$f" | sed "s|^/tmp/syzygy_backup/||")
                cp "$f" "/opt/syzygy/$rel"
                echo "  ✅ 恢复: $rel"
              done
              rm -rf /tmp/syzygy_backup
            fi

            # 补录历史对话原文到 transcripts（idempotent，已有则跳过）
            node migrate_transcripts.js || echo "⚠️ 补录脚本失败，继续部署"

            # 将当前 transcript_buffer 也归档到当月的 transcript 文件，防止消息丢失
            node -e "
            const fs = require('fs');
            const path = require('path');
            const bufFile = 'data/transcript_buffer.json';
            if (!fs.existsSync(bufFile)) process.exit(0);
            const buf = JSON.parse(fs.readFileSync(bufFile, 'utf8'));
            if (!buf.messages || buf.messages.length === 0) process.exit(0);
            const content = buf.messages.map(m => {
                const d = m.time ? new Date(m.time) : new Date();
                return '[' + (d.getMonth()+1) + '月' + d.getDate() + '日] ' + (m.role === 'user' ? '江鱼' : '沈望') + ': ' + m.content;
            }).join('\n');
            const firstUser = buf.messages.find(m => m.role === 'user');
            const firstAi = buf.messages.find(m => m.role === 'assistant');
            const chunk = {
                id: 'tx_buf_' + Date.now().toString(36),
                timestamp: buf.started_at || new Date().toISOString(),
                end_time: new Date().toISOString(),
                platform: 'web', topic_boundary: false,
                messages: buf.messages,
                chunk_summary: ((firstUser?.content||'').substring(0,30) + ' → ' + (firstAi?.content||'').substring(0,30)).trim(),
                content: content,
                tags: [], expires_at: null
            };
            const d = new Date();
            const monthFile = path.join('data','transcripts', d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'.json');
            let existing = [];
            try { existing = JSON.parse(fs.readFileSync(monthFile, 'utf8')); } catch(e) {}
            existing.push(chunk);
            fs.writeFileSync(monthFile, JSON.stringify(existing, null, 2), 'utf8');
            fs.unlinkSync(bufFile);
            console.log('📜 buffer 已归档: ' + chunk.id + ' (' + buf.messages.length + '条消息)');
            " || echo "⚠️ buffer 归档失败"

            systemctl restart syzygy.service
            echo "=== DEPLOY OK ==="
          '
