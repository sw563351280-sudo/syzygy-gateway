name: Deploy to Contabo

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 46.250.248.31
          username: root
          key: ${{ secrets.CONTABO_SSH_KEY }}
          port: 22
          script: |
            cd /opt/syzygy-gateway || cd /root/syzygy-gateway || exit 1
            git pull origin main
            npm install --production
            systemctl restart syzygy.service
            echo "✅ Deployed at $(date)"
