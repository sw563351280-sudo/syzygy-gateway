name: Deploy to Contabo

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
        env:
          SSH_KEY: ${{ secrets.CONTABO_SSH_KEY }}

      - name: Deploy
        run: |
          ssh -p 2222 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=20 -o PasswordAuthentication=no -i ~/.ssh/deploy_key root@46.250.248.31 '
            set -e
            cd /opt/syzygy || exit 1

            # 备份沈望在VPS上修改的文件
            mkdir -p /tmp/syzygy_backup
            git diff --name-only | while read f; do
              if [ -f "$f" ]; then
                dir=$(dirname "$f")
                mkdir -p "/tmp/syzygy_backup/$dir"
                cp "$f" "/tmp/syzygy_backup/$f"
                echo "  💾 备份: $f"
              fi
            done

            # 部署最新代码
            git fetch origin main
            git reset --hard origin/main
            npm install --production

            # 恢复沈望的本地修改
            if [ -d /tmp/syzygy_backup ]; then
              find /tmp/syzygy_backup -type f | while read f; do
                rel=$(echo "$f" | sed "s|^/tmp/syzygy_backup/||")
                cp "$f" "/opt/syzygy/$rel"
                echo "  ✅ 恢复: $rel"
              done
              rm -rf /tmp/syzygy_backup
            fi

            systemctl restart syzygy.service
            echo "=== DEPLOY OK ==="
          '
