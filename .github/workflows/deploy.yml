name: Deploy to Contabo

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
        env:
          SSH_KEY: ${{ secrets.CONTABO_SSH_KEY }}

      - name: Deploy
        run: |
          ssh -p 2222 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=20 -o PasswordAuthentication=no -i ~/.ssh/deploy_key root@46.250.248.31 "
            set -e
            SVC=/etc/systemd/system/syzygy.service

            # 清理旧的主动消息环境变量 + typo的key
            sed -i -e '/PROACTIVE_KEY=/d' -e '/PROACTIVE_MODEL=/d' -e '/PROACTIVE_URL=/d' -e '/CFT4r/d' \$SVC

            # 在 DREAM_API_KEY 之前插入 msui 配置（逆序插入以保持顺序）
            sed -i '/^Environment=\"DREAM_API_KEY/i Environment=\"PROACTIVE_URL=https://www.msuicode.com/v1/chat/completions\"' \$SVC
            sed -i '/^Environment=\"DREAM_API_KEY/i Environment=\"PROACTIVE_MODEL=claude-opus-4-6\"' \$SVC
            sed -i '/^Environment=\"DREAM_API_KEY/i Environment=\"PROACTIVE_KEY=sk-jodiKrzzGDtNR9S7PaUaTsSp0OdJxBD9lD6KqDOaSD2iochX\"' \$SVC

            systemctl daemon-reload

            cd /opt/syzygy || exit 1
            git fetch origin main
            git reset --hard origin/main
            npm install --production
            systemctl restart syzygy.service
            echo '=== DEPLOY OK ==='
          "
