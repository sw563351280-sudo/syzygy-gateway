name: Deploy to Contabo

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
        env:
          SSH_KEY: ${{ secrets.CONTABO_SSH_KEY }}

      - name: Deploy
        run: |
          ssh -p 2222 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=20 -o PasswordAuthentication=no -i ~/.ssh/deploy_key root@46.250.248.31 "
            set -e
            SVC=/etc/systemd/system/syzygy.service

            # 1. 修复 DZZI_API_KEY typo (CFT4r → CFT4R)
            sed -i 's|CFT4r|CFT4R|' \$SVC

            # 2. 修复 PROACTIVE_MODEL (必须有[0.1]前缀)
            sed -i 's|Environment=\"PROACTIVE_MODEL=.*\"|Environment=\"PROACTIVE_MODEL=[0.1]claude-opus-4-6\"|' \$SVC

            # 3. 修复 PROACTIVE_URL (直连dzzi，不走代理绕圈)
            sed -i 's|Environment=\"PROACTIVE_URL=.*\"|Environment=\"PROACTIVE_URL=https://api.dzzi.ai/v1/chat/completions\"|' \$SVC

            systemctl daemon-reload

            cd /opt/syzygy || exit 1
            git fetch origin main
            git reset --hard origin/main
            npm install --production
            systemctl restart syzygy.service
            echo '=== DEPLOY OK ==='
          "
