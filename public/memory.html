<!DOCTYPE html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>星渡 · Syzygy</title>
<style>
@font-face{font-family:'Ximai';src:url('/ximai.ttf') format('truetype');font-display:swap}
:root{--bg-primary:#222;--bg-card:#2A2A2A;--bg-hover:#333;--text-primary:#E8E8E8;--text-secondary:#888;--text-muted:#555;--accent-blue:#4D7CFF;--accent-gold:#D4A853;--accent-purple:#7C4DFF;--accent-warm:#C8B89A;--border:#333}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg-primary);color:var(--text-primary);height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;padding:1.5rem}
.title-section{text-align:center}
.main-title{font-family:'Ximai',serif;font-size:2.2rem;color:var(--text-primary);font-weight:normal;letter-spacing:.15em}
.sub-title{font-size:.8rem;color:var(--text-muted);margin-top:.5rem}
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:2.5rem;width:min(calc(100vw - 2rem),360px)}
.card-link{text-decoration:none;display:block}
.card{background:var(--bg-card);border-radius:16px;padding:1.2rem 1rem;position:relative;overflow:hidden;transition:background-color .15s ease;cursor:pointer;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.card:hover{background:var(--bg-hover)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.card.timeline::before{background:var(--accent-blue)}
.card.archive::before{background:var(--accent-gold)}
.card.diary::before{background:var(--accent-warm)}
.card.gallery::before{background:var(--accent-purple)}
.card svg{margin-bottom:8px}
.card .card-name{font-size:.95rem;color:var(--text-primary);margin-bottom:4px}
.card .card-desc{font-size:.75rem;color:var(--text-muted)}
.footer{position:absolute;bottom:1.5rem;font-size:.7rem;color:#333;text-align:center}
.toast{position:fixed;bottom:4rem;left:50%;transform:translateX(-50%);background:var(--bg-card);color:var(--text-secondary);padding:10px 24px;border-radius:8px;font-size:.85rem;z-index:99;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
@media(min-width:768px){.card-grid{width:420px}}
</style></head><body>
<div class="title-section"><h1 class="main-title">星渡</h1><p class="sub-title">沈望与江鱼的共同记忆</p></div>
<div class="card-grid">
<a class="card-link" href="/memory-manager.html?tab=timeline"><div class="card timeline">
<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4D7CFF" stroke-width="1.5" stroke-linecap="round"><path d="M3 12h4l2-5 4 14 3-9h5"/></svg>
<div class="card-name">时间线</div><div class="card-desc">对话的河流</div>
</div></a>
<a class="card-link" href="/memory-manager.html?tab=archive"><div class="card archive">
<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#D4A853" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12,2 22,9 12,17 2,9"/><polygon points="12,17 22,9 12,22 2,9"/></svg>
<div class="card-name">档案室</div><div class="card-desc">刻进骨头的事</div>
</div></a>
<a class="card-link" href="/memory-manager.html?tab=diary"><div class="card diary">
<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#C8B89A" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="2" width="14" height="20" rx="2"/><line x1="7" y1="6" x2="13" y2="6"/><line x1="7" y1="10" x2="13" y2="10"/><line x1="7" y1="14" x2="11" y2="14"/><rect x="17" y="4" width="5" height="16" rx="1" fill="none"/><path d="M19 8l1 2-1 2"/></svg>
<div class="card-name">日记本</div><div class="card-desc">你亲手写的字</div>
</div></a>
<a class="card-link" href="/memory-manager.html?tab=gallery"><div class="card gallery">
<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#7C4DFF" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
<div class="card-name">相册</div><div class="card-desc">你给我看过的世界</div>
</div></a>
</div>
<div class="footer">Built with love by 江鱼 · Syzygy</div>
<div class="toast" id="toast">还在搭建中…</div>
<script>
const MPWD=new URLSearchParams(location.search).get('pwd')||'111111';
document.querySelectorAll('.card-link').forEach(a=>{if(MPWD)a.href=a.href+'&pwd='+encodeURIComponent(MPWD)});
function showToast(){const t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
</script>
</body></html>
