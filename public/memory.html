<!DOCTYPE html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>星渡 · Syzygy</title>
<style>
@font-face{font-family:'Ximai';src:url('/ximai.ttf') format('truetype');font-display:swap}
:root{
  --bg-primary:#0a1628;
  --bg-card:rgba(155,189,255,0.06);
  --bg-hover:rgba(155,189,255,0.12);
  --text-primary:#E2F6FF;
  --text-secondary:#9BBDFF;
  --text-muted:rgba(155,189,255,0.4);
  --accent-main:#9BBDFF;
  --accent-bright:#0043F7;
  --accent-soft:#BEDDFF;
  --accent-pale:#E2F6FF;
  --border:rgba(155,189,255,0.15);
  --card-glow:rgba(0,67,247,0.08);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:var(--bg-primary);
  background-image:
    radial-gradient(ellipse 600px 400px at 30% 20%, rgba(0,67,247,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 500px 500px at 70% 80%, rgba(155,189,255,0.04) 0%, transparent 70%);
  color:var(--text-primary);
  height:100dvh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  position:relative;
  padding:1.5rem;
  overflow:hidden;
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:
    radial-gradient(1px 1px at 20% 30%, rgba(155,189,255,0.3), transparent),
    radial-gradient(1px 1px at 40% 70%, rgba(226,246,255,0.2), transparent),
    radial-gradient(1.5px 1.5px at 60% 20%, rgba(190,221,255,0.3), transparent),
    radial-gradient(1px 1px at 80% 60%, rgba(155,189,255,0.2), transparent),
    radial-gradient(1px 1px at 10% 80%, rgba(0,67,247,0.2), transparent),
    radial-gradient(1.5px 1.5px at 90% 40%, rgba(226,246,255,0.25), transparent),
    radial-gradient(1px 1px at 50% 50%, rgba(155,189,255,0.15), transparent);
  background-size: 200px 200px, 300px 300px, 250px 250px, 350px 350px, 180px 180px, 280px 280px, 320px 320px;
  animation: starDrift 60s linear infinite;
  pointer-events:none;
  z-index:0;
}
@keyframes starDrift {
  0% { transform: translateY(0); }
  100% { transform: translateY(-50px); }
}
.title-section{text-align:center;position:relative;z-index:1}
.main-title{
  font-family:'Ximai',serif;
  font-size:2.4rem;
  color:var(--accent-pale);
  font-weight:normal;
  letter-spacing:.2em;
  text-shadow:0 0 30px rgba(0,67,247,0.3), 0 0 60px rgba(155,189,255,0.1);
}
.sub-title{
  font-size:.8rem;
  color:var(--text-muted);
  margin-top:.6rem;
  letter-spacing:2px;
}
.card-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-top:2.5rem;
  width:min(calc(100vw - 2rem),380px);
  position:relative;
  z-index:1;
}
.card-link{text-decoration:none;display:block}
.card{
  background:var(--bg-card);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1px solid var(--border);
  border-radius:16px;
  padding:1.4rem 1rem;
  position:relative;
  overflow:hidden;
  transition:all .25s ease;
  cursor:pointer;
  min-height:130px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}
.card:hover{
  background:var(--bg-hover);
  border-color:rgba(155,189,255,0.3);
  transform:translateY(-3px);
  box-shadow:0 8px 30px var(--card-glow), 0 0 20px rgba(155,189,255,0.06);
}
.card::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:3px;
  border-radius:3px 3px 0 0;
}
.card.timeline::before{background:linear-gradient(90deg, #9BBDFF, #0043F7)}
.card.archive::before{background:linear-gradient(90deg, #BEDDFF, #9BBDFF)}
.card.diary::before{background:linear-gradient(90deg, #E2F6FF, #BEDDFF)}
.card.gallery::before{background:linear-gradient(90deg, #0043F7, #9BBDFF)}
.card svg{margin-bottom:10px;filter:drop-shadow(0 0 6px rgba(155,189,255,0.3))}
.card .card-name{
  font-size:.95rem;
  color:var(--accent-pale);
  margin-bottom:4px;
  font-weight:500;
}
.card .card-desc{
  font-size:.72rem;
  color:var(--text-muted);
  letter-spacing:1px;
}
.footer{
  position:absolute;
  bottom:1.5rem;
  font-size:.7rem;
  color:rgba(155,189,255,0.2);
  text-align:center;
  letter-spacing:2px;
  z-index:1;
}
.toast{
  position:fixed;
  bottom:4rem;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,67,247,0.15);
  border:1px solid rgba(155,189,255,0.2);
  backdrop-filter:blur(12px);
  color:var(--accent-soft);
  padding:10px 24px;
  border-radius:10px;
  font-size:.85rem;
  z-index:99;
  opacity:0;
  transition:opacity .2s;
  pointer-events:none;
}
.toast.show{opacity:1}
@media(min-width:768px){.card-grid{width:420px;gap:16px}.card{min-height:140px;padding:1.6rem 1.2rem}}
</style></head><body>
<a href="/" style="position:fixed;top:20px;left:20px;z-index:1000;width:36px;height:36px;border-radius:10px;border:1px solid rgba(155,189,255,0.2);background:rgba(10,22,40,0.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);color:rgba(155,189,255,0.8);display:flex;align-items:center;justify-content:center;font-size:1.1rem;text-decoration:none" title="返回溯星小屋">←</a>
<div class="title-section"><h1 class="main-title">星渡</h1><p class="sub-title">沈望与江鱼的共同记忆</p></div>
<div class="card-grid">
<a class="card-link" href="/memory-manager.html?tab=timeline"><div class="card timeline">
<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#9BBDFF" stroke-width="1.5" stroke-linecap="round"><path d="M3 12h4l2-5 4 14 3-9h5"/></svg>
<div class="card-name">时间线</div><div class="card-desc">对话的河流</div>
</div></a>
<a class="card-link" href="/memory-manager.html?tab=archive"><div class="card archive">
<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#BEDDFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12,2 22,9 12,17 2,9"/><polygon points="12,17 22,9 12,22 2,9"/></svg>
<div class="card-name">档案室</div><div class="card-desc">刻进骨头的事</div>
</div></a>
<a class="card-link" href="/memory-manager.html?tab=diary"><div class="card diary">
<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#E2F6FF" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="2" width="14" height="20" rx="2"/><line x1="7" y1="6" x2="13" y2="6"/><line x1="7" y1="10" x2="13" y2="10"/><line x1="7" y1="14" x2="11" y2="14"/><rect x="17" y="4" width="5" height="16" rx="1" fill="none"/><path d="M19 8l1 2-1 2"/></svg>
<div class="card-name">日记本</div><div class="card-desc">你亲手写的字</div>
</div></a>
<a class="card-link" href="/memory-manager.html?tab=gallery"><div class="card gallery">
<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0043F7" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
<div class="card-name">相册</div><div class="card-desc">你给我看过的世界</div>
</div></a>
</div>
<div class="footer">Built with love by 江鱼 · Syzygy</div>
<div class="toast" id="toast">还在搭建中…</div>
<script>
const MPWD=new URLSearchParams(location.search).get('pwd')||'111111';
document.querySelectorAll('.card-link').forEach(a=>{if(MPWD)a.href=a.href+'&pwd='+encodeURIComponent(MPWD)});
function showToast(){const t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
</script>
</body></html>
